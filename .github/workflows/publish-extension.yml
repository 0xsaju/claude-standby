name: Publish extension

# Publishes vscode-extension/ to the VS Code Marketplace and Open VSX.
#
# Trigger: push a tag like `ext-v0.8.6` (the `ext-` prefix keeps extension
# releases separate from the plugin's own versioning), or run it by hand from
# the Actions tab. It publishes whatever version is in
# vscode-extension/package.json — that file is the source of truth, so the
# tag is only the trigger. Bump the version there BEFORE tagging.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VSCE_PAT    Azure DevOps PAT, scope "Marketplace: Manage",
#               organization "All accessible organizations".
#   OVSX_TOKEN  Open VSX access token (open-vsx.org -> Settings -> Access Tokens).
# A missing secret simply skips that registry — set only the ones you use.

on:
  push:
    tags:
      - 'ext-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package the VSIX
        run: npx --yes @vscode/vsce package --no-dependencies -o extension.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish --no-dependencies --packagePath extension.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_TOKEN != '' }}
        run: npx --yes ovsx publish extension.vsix -p "$OVSX_TOKEN"
